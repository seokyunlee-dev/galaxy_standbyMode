<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Galaxy StandBy</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    /* ══════════════════════════════════════════════════════
       RESET & BASE
    ══════════════════════════════════════════════════════ */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
      -webkit-user-select: none;
      user-select: none;
    }

    :root {
      --bg:           #050505;
      --surface:      rgba(255,255,255,0.04);
      --surface-hover:rgba(255,255,255,0.08);
      --border:       rgba(255,255,255,0.08);
      --text-primary: #F5F5F7;
      --text-secondary:#A1A1A6;
      --text-dim:     #636366;
      --accent-blue:  #0A84FF;
      --accent-green: #30D158;
      --accent-pink:  #FF375F;
      --accent-orange:#FF9F0A;
      --accent-purple:#BF5AF2;
      --divider:      rgba(255,255,255,0.06);
      --glow-blue:    rgba(10,132,255,0.25);
      --glow-green:   rgba(48,209,88,0.20);
      --font:         'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      --radius-lg:    20px;
      --radius-md:    14px;
      --radius-sm:    10px;
      --transition:   0.35s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--bg);
      font-family: var(--font);
      color: var(--text-primary);
      -webkit-font-smoothing: antialiased;
    }

    /* ══════════════════════════════════════════════════════
       MAIN LAYOUT — 좌우 50:50 분할
    ══════════════════════════════════════════════════════ */
    .dashboard {
      display: flex;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
    }

    /* ── 좌측 패널 ── */
    .panel-left {
      flex: 0 0 50%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 32px 28px;
      position: relative;
      border-right: 1px solid var(--divider);
      gap: 24px;
    }

    /* 좌측 배경 그라데이션 */
    .panel-left::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse 70% 50% at 30% 40%,
                    rgba(10,132,255,0.06) 0%,
                    transparent 70%),
                  radial-gradient(ellipse 50% 60% at 80% 80%,
                    rgba(191,90,242,0.04) 0%,
                    transparent 70%);
      pointer-events: none;
    }

    /* ── 우측 패널 ── */
    .panel-right {
      flex: 0 0 50%;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      position: relative;
    }

    /* ══════════════════════════════════════════════════════
       시계 섹션
    ══════════════════════════════════════════════════════ */
    .clock-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      z-index: 1;
    }

    .clock-time {
      font-size: clamp(64px, 9vw, 108px);
      font-weight: 700;
      letter-spacing: -4px;
      line-height: 1;
      background: linear-gradient(135deg, #FFFFFF 0%, #A1A1A6 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      transition: opacity 0.3s;
    }

    .clock-ampm {
      font-size: clamp(14px, 2vw, 20px);
      font-weight: 500;
      color: var(--text-secondary);
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .clock-date {
      font-size: clamp(13px, 1.6vw, 17px);
      font-weight: 400;
      color: var(--text-dim);
      letter-spacing: 0.5px;
      margin-top: 4px;
    }

    /* ══════════════════════════════════════════════════════
       날씨 섹션
    ══════════════════════════════════════════════════════ */
    .weather-card {
      width: 100%;
      max-width: 280px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 20px 22px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      z-index: 1;
      backdrop-filter: blur(10px);
      transition: background var(--transition);
    }

    .weather-card:hover {
      background: var(--surface-hover);
    }

    .weather-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .weather-location {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      font-weight: 500;
      color: var(--text-secondary);
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .weather-location svg {
      width: 12px;
      height: 12px;
      fill: var(--accent-blue);
    }

    .weather-main {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
    }

    .weather-temp-wrap {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .weather-temp {
      font-size: clamp(36px, 5vw, 52px);
      font-weight: 700;
      letter-spacing: -2px;
      line-height: 1;
      color: var(--text-primary);
    }

    .weather-temp span {
      font-size: 0.55em;
      font-weight: 400;
      color: var(--text-secondary);
      vertical-align: super;
    }

    .weather-desc {
      font-size: 13px;
      color: var(--text-secondary);
      font-weight: 400;
    }

    .weather-icon {
      font-size: 42px;
      line-height: 1;
      filter: drop-shadow(0 0 12px rgba(255,200,0,0.3));
      transition: transform var(--transition);
    }

    .weather-card:hover .weather-icon {
      transform: scale(1.1) rotate(5deg);
    }

    .weather-details {
      display: flex;
      gap: 12px;
    }

    .weather-detail-item {
      flex: 1;
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 8px 10px;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .weather-detail-label {
      font-size: 10px;
      color: var(--text-dim);
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .weather-detail-value {
      font-size: 14px;
      color: var(--text-primary);
      font-weight: 600;
    }

    /* 날씨 로딩 상태 */
    .weather-loading {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: var(--text-dim);
    }

    .spinner {
      width: 14px;
      height: 14px;
      border: 2px solid var(--border);
      border-top-color: var(--accent-blue);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* ══════════════════════════════════════════════════════
       우측 — scroll-snap 컨테이너
    ══════════════════════════════════════════════════════ */
    .scroll-container {
      flex: 1;
      overflow-y: scroll;
      scroll-snap-type: y mandatory;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
      -ms-overflow-style: none;
    }

    .scroll-container::-webkit-scrollbar {
      display: none;
    }

    .scroll-page {
      height: 100vh;
      scroll-snap-align: start;
      scroll-snap-stop: always;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* 스크롤 인디케이터 도트 */
    .scroll-indicator {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      display: flex;
      flex-direction: column;
      gap: 8px;
      z-index: 10;
    }

    .scroll-dot {
      width: 4px;
      height: 4px;
      border-radius: 2px;
      background: var(--text-dim);
      transition: all var(--transition);
    }

    .scroll-dot.active {
      height: 16px;
      background: var(--text-primary);
    }

    /* ══════════════════════════════════════════════════════
       달력 페이지
    ══════════════════════════════════════════════════════ */
    .calendar-page {
      padding: 20px 20px 20px 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      overflow: hidden;
    }

    .section-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--text-dim);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .section-label::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--divider);
    }

    /* 미니 달력 그리드 */
    .mini-calendar {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 16px 18px;
      flex-shrink: 0;
    }

    .cal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }

    .cal-month {
      font-size: 15px;
      font-weight: 600;
      color: var(--text-primary);
      letter-spacing: -0.3px;
    }

    .cal-nav {
      display: flex;
      gap: 8px;
    }

    .cal-nav-btn {
      width: 26px;
      height: 26px;
      border-radius: 50%;
      background: var(--surface-hover);
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: background var(--transition);
      color: var(--text-secondary);
    }

    .cal-nav-btn:hover {
      background: rgba(255,255,255,0.15);
    }

    .cal-nav-btn svg {
      width: 10px;
      height: 10px;
      fill: currentColor;
    }

    .cal-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 2px;
    }

    .cal-day-name {
      text-align: center;
      font-size: 10px;
      font-weight: 600;
      color: var(--text-dim);
      letter-spacing: 0.5px;
      text-transform: uppercase;
      padding: 4px 0;
    }

    .cal-day-name:first-child { color: var(--accent-pink); }
    .cal-day-name:last-child  { color: var(--accent-blue); }

    .cal-cell {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      aspect-ratio: 1;
      font-size: 11px;
      font-weight: 400;
      color: var(--text-secondary);
      border-radius: 50%;
      cursor: default;
      transition: background var(--transition), color var(--transition);
    }

    .cal-cell:empty {
      pointer-events: none;
    }

    .cal-cell.other-month {
      color: var(--text-dim);
      opacity: 0.4;
    }

    .cal-cell.today {
      background: var(--accent-blue);
      color: #fff;
      font-weight: 700;
      box-shadow: 0 0 10px var(--glow-blue);
    }

    .cal-cell.has-event::after {
      content: '';
      position: absolute;
      bottom: 2px;
      left: 50%;
      transform: translateX(-50%);
      width: 3px;
      height: 3px;
      border-radius: 50%;
      background: var(--accent-orange);
    }

    .cal-cell.today.has-event::after {
      background: #fff;
    }

    /* 일정 리스트 */
    .event-list-wrap {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .event-list-wrap::-webkit-scrollbar {
      width: 3px;
    }

    .event-list-wrap::-webkit-scrollbar-track {
      background: transparent;
    }

    .event-list-wrap::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 2px;
    }

    .event-item {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 12px 14px;
      transition: background var(--transition), border-color var(--transition);
      animation: fadeSlideIn 0.3s ease both;
    }

    .event-item.today-event {
      border-color: rgba(10,132,255,0.3);
      background: rgba(10,132,255,0.06);
    }

    @keyframes fadeSlideIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .event-color-bar {
      width: 3px;
      min-height: 32px;
      border-radius: 2px;
      background: var(--accent-blue);
      flex-shrink: 0;
      margin-top: 2px;
    }

    .event-content {
      flex: 1;
      min-width: 0;
    }

    .event-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-primary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 3px;
    }

    .event-time {
      font-size: 11px;
      color: var(--text-dim);
      font-weight: 400;
    }

    .event-date-badge {
      font-size: 10px;
      font-weight: 600;
      color: var(--accent-blue);
      background: rgba(10,132,255,0.12);
      border-radius: 6px;
      padding: 2px 7px;
      flex-shrink: 0;
      white-space: nowrap;
    }

    .no-events {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex: 1;
      gap: 10px;
      opacity: 0.5;
      padding: 20px;
    }

    .no-events-icon {
      font-size: 32px;
      opacity: 0.4;
    }

    .no-events-text {
      font-size: 13px;
      color: var(--text-dim);
      text-align: center;
    }

    /* ══════════════════════════════════════════════════════
       미디어 플레이어 페이지
    ══════════════════════════════════════════════════════ */
    .media-page {
      padding: 20px 20px 20px 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      justify-content: center;
    }

    /* 앨범 아트 + 곡 정보 카드 */
    .media-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 20px;
      display: flex;
      gap: 18px;
      align-items: center;
      position: relative;
      overflow: hidden;
      transition: background var(--transition);
    }

    /* 배경 블러 그라데이션 */
    .media-card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse 80% 60% at 20% 50%,
                    rgba(191,90,242,0.08) 0%,
                    transparent 70%);
      pointer-events: none;
    }

    .album-art {
      width: 68px;
      height: 68px;
      border-radius: var(--radius-md);
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 40%, #0f3460 100%);
      flex-shrink: 0;
      position: relative;
      overflow: hidden;
      box-shadow: 0 8px 24px rgba(0,0,0,0.5);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .album-art-icon {
      font-size: 28px;
      opacity: 0.5;
    }

    .album-art.playing {
      animation: albumPulse 3s ease-in-out infinite;
    }

    @keyframes albumPulse {
      0%, 100% { box-shadow: 0 8px 24px rgba(0,0,0,0.5), 0 0 0 0 rgba(191,90,242,0); }
      50%       { box-shadow: 0 8px 24px rgba(0,0,0,0.5), 0 0 0 8px rgba(191,90,242,0.15); }
    }

    .media-info {
      flex: 1;
      min-width: 0;
      z-index: 1;
    }

    .media-status {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--accent-green);
      display: flex;
      align-items: center;
      gap: 5px;
      margin-bottom: 6px;
    }

    .media-status.paused {
      color: var(--text-dim);
    }

    .live-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--accent-green);
      animation: livePulse 1.5s ease-in-out infinite;
    }

    .live-dot.paused {
      animation: none;
      background: var(--text-dim);
    }

    @keyframes livePulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.4; transform: scale(0.7); }
    }

    .media-title {
      font-size: 16px;
      font-weight: 700;
      color: var(--text-primary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 4px;
      letter-spacing: -0.3px;
    }

    .media-title.scrolling {
      animation: marquee 8s linear infinite;
    }

    @keyframes marquee {
      0%   { transform: translateX(0); }
      30%  { transform: translateX(0); }
      70%  { transform: translateX(calc(-100% + 180px)); }
      100% { transform: translateX(0); }
    }

    .media-artist {
      font-size: 12px;
      font-weight: 400;
      color: var(--text-secondary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* 진행 바 */
    .media-progress {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 14px 18px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .progress-bar-wrap {
      position: relative;
      width: 100%;
      height: 3px;
      background: rgba(255,255,255,0.1);
      border-radius: 2px;
      overflow: hidden;
    }

    .progress-bar-fill {
      height: 100%;
      border-radius: 2px;
      background: linear-gradient(90deg, var(--accent-purple), var(--accent-blue));
      transition: width 1s linear;
      position: relative;
    }

    .progress-bar-fill.animating {
      animation: progressAnim 30s linear infinite;
    }

    @keyframes progressAnim {
      from { width: 0%; }
      to   { width: 100%; }
    }

    .progress-bar-fill::after {
      content: '';
      position: absolute;
      right: 0;
      top: 50%;
      transform: translateY(-50%);
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #fff;
      box-shadow: 0 0 6px rgba(255,255,255,0.6);
    }

    .progress-times {
      display: flex;
      justify-content: space-between;
      font-size: 11px;
      color: var(--text-dim);
      font-weight: 500;
    }

    /* 비주얼라이저 (데코레이션) */
    .visualizer {
      display: flex;
      align-items: flex-end;
      gap: 3px;
      height: 28px;
    }

    .vis-bar {
      width: 3px;
      border-radius: 2px;
      background: linear-gradient(to top, var(--accent-blue), var(--accent-purple));
      transition: height 0.15s ease;
    }

    .vis-bar.active {
      animation: visAnim 0.6s ease-in-out infinite alternate;
    }

    .vis-bar:nth-child(1)  { animation-delay: 0.00s; }
    .vis-bar:nth-child(2)  { animation-delay: 0.05s; }
    .vis-bar:nth-child(3)  { animation-delay: 0.10s; }
    .vis-bar:nth-child(4)  { animation-delay: 0.15s; }
    .vis-bar:nth-child(5)  { animation-delay: 0.20s; }
    .vis-bar:nth-child(6)  { animation-delay: 0.25s; }
    .vis-bar:nth-child(7)  { animation-delay: 0.30s; }
    .vis-bar:nth-child(8)  { animation-delay: 0.35s; }
    .vis-bar:nth-child(9)  { animation-delay: 0.40s; }
    .vis-bar:nth-child(10) { animation-delay: 0.45s; }
    .vis-bar:nth-child(11) { animation-delay: 0.50s; }
    .vis-bar:nth-child(12) { animation-delay: 0.55s; }

    @keyframes visAnim {
      from { height: 3px;  }
      to   { height: 24px; }
    }

    /* 권한 안내 카드 */
    .permission-card {
      background: rgba(255,159,10,0.08);
      border: 1px solid rgba(255,159,10,0.25);
      border-radius: var(--radius-md);
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .permission-icon {
      font-size: 24px;
      flex-shrink: 0;
    }

    .permission-text {
      flex: 1;
    }

    .permission-text p {
      font-size: 12px;
      color: var(--text-secondary);
      line-height: 1.5;
    }

    .permission-text strong {
      color: var(--accent-orange);
    }

    .permission-btn {
      margin-top: 8px;
      padding: 6px 14px;
      background: var(--accent-orange);
      color: #000;
      border: none;
      border-radius: var(--radius-sm);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.5px;
      cursor: pointer;
      font-family: var(--font);
      transition: opacity var(--transition);
    }

    .permission-btn:hover {
      opacity: 0.85;
    }

    /* ══════════════════════════════════════════════════════
       유틸리티
    ══════════════════════════════════════════════════════ */
    .hidden { display: none !important; }

    .fade-transition {
      transition: opacity var(--transition);
    }
  </style>
</head>
<body>

<div class="dashboard" id="dashboard">

  <!-- ════════════════════════════════════
       LEFT PANEL — 시계 + 날씨
  ════════════════════════════════════ -->
  <div class="panel-left" id="panelLeft">

    <!-- 시계 -->
    <div class="clock-section">
      <div class="clock-time" id="clockTime">00:00</div>
      <div class="clock-ampm" id="clockAmpm">AM</div>
      <div class="clock-date" id="clockDate">Loading...</div>
    </div>

    <!-- 날씨 카드 -->
    <div class="weather-card" id="weatherCard">
      <div class="weather-header">
        <div class="weather-location" id="weatherLocation">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5S10.62 6.5 12 6.5s2.5 1.12 2.5 2.5S13.38 11.5 12 11.5z"/>
          </svg>
          현재 위치
        </div>
      </div>
      <div id="weatherLoading" class="weather-loading">
        <div class="spinner"></div>
        날씨 정보 로딩 중...
      </div>
      <div id="weatherContent" class="hidden">
        <div class="weather-main">
          <div class="weather-temp-wrap">
            <div class="weather-temp">
              <span id="weatherTempVal">--</span><span>°</span>
            </div>
            <div class="weather-desc" id="weatherDesc">--</div>
          </div>
          <div class="weather-icon" id="weatherIcon">🌤</div>
        </div>
        <div class="weather-details">
          <div class="weather-detail-item">
            <div class="weather-detail-label">체감</div>
            <div class="weather-detail-value" id="weatherFeels">--°</div>
          </div>
          <div class="weather-detail-item">
            <div class="weather-detail-label">습도</div>
            <div class="weather-detail-value" id="weatherHumidity">--%</div>
          </div>
          <div class="weather-detail-item">
            <div class="weather-detail-label">바람</div>
            <div class="weather-detail-value" id="weatherWind">--</div>
          </div>
        </div>
      </div>
    </div>

  </div><!-- /panel-left -->

  <!-- ════════════════════════════════════
       RIGHT PANEL — scroll-snap
  ════════════════════════════════════ -->
  <div class="panel-right" id="panelRight">

    <!-- 스크롤 인디케이터 -->
    <div class="scroll-indicator" id="scrollIndicator">
      <div class="scroll-dot active" data-page="0"></div>
      <div class="scroll-dot" data-page="1"></div>
    </div>

    <div class="scroll-container" id="scrollContainer">

      <!-- ─────────────── PAGE 1: 달력 ─────────────── -->
      <div class="scroll-page" id="calendarPage">
        <div class="calendar-page">

          <div class="section-label">📅 이번 달 일정</div>

          <!-- 미니 달력 -->
          <div class="mini-calendar">
            <div class="cal-header">
              <div class="cal-month" id="calMonth">2026년 6월</div>
              <div class="cal-nav">
                <div class="cal-nav-btn" id="calPrev" onclick="navigateMonth(-1)">
                  <svg viewBox="0 0 24 24"><path d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z"/></svg>
                </div>
                <div class="cal-nav-btn" id="calNext" onclick="navigateMonth(1)">
                  <svg viewBox="0 0 24 24"><path d="M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z"/></svg>
                </div>
              </div>
            </div>
            <div class="cal-grid" id="calGrid">
              <!-- JS로 채워짐 -->
            </div>
          </div>

          <!-- 일정 리스트 -->
          <div class="event-list-wrap" id="eventList">
            <div class="no-events">
              <div class="no-events-icon">📭</div>
              <div class="no-events-text">일정을 불러오는 중...</div>
            </div>
          </div>

        </div>
      </div><!-- /calendarPage -->

      <!-- ─────────────── PAGE 2: 미디어 ─────────────── -->
      <div class="scroll-page" id="mediaPage">
        <div class="media-page">

          <div class="section-label">🎵 Now Playing</div>

          <!-- 미디어 카드 -->
          <div class="media-card" id="mediaCard">
            <div class="album-art" id="albumArt">
              <span class="album-art-icon">🎵</span>
            </div>
            <div class="media-info">
              <div class="media-status paused" id="mediaStatus">
                <div class="live-dot paused" id="liveDot"></div>
                <span id="mediaStatusText">대기 중</span>
              </div>
              <div class="media-title" id="mediaTitle">재생 중인 곡 없음</div>
              <div class="media-artist" id="mediaArtist">음악을 재생해보세요</div>
            </div>
          </div>

          <!-- 진행 바 -->
          <div class="media-progress" id="mediaProgressWrap">
            <div class="progress-bar-wrap">
              <div class="progress-bar-fill" id="progressFill"></div>
            </div>
            <div class="progress-times">
              <span id="progressCurrent">--:--</span>
              <span id="progressTotal">--:--</span>
            </div>
          </div>

          <!-- 오디오 비주얼라이저 (데코) -->
          <div style="display:flex; align-items:center; gap:14px; padding: 0 4px;">
            <div class="visualizer" id="visualizer">
              <div class="vis-bar" style="height:4px"></div>
              <div class="vis-bar" style="height:10px"></div>
              <div class="vis-bar" style="height:7px"></div>
              <div class="vis-bar" style="height:18px"></div>
              <div class="vis-bar" style="height:14px"></div>
              <div class="vis-bar" style="height:22px"></div>
              <div class="vis-bar" style="height:9px"></div>
              <div class="vis-bar" style="height:16px"></div>
              <div class="vis-bar" style="height:20px"></div>
              <div class="vis-bar" style="height:12px"></div>
              <div class="vis-bar" style="height:6px"></div>
              <div class="vis-bar" style="height:10px"></div>
            </div>
            <div style="flex:1; font-size:11px; color:var(--text-dim);">
              Android 알림 리스너가 미디어 정보를 실시간으로 감지합니다
            </div>
          </div>

          <!-- 알림 리스너 권한 카드 -->
          <div class="permission-card" id="permissionCard">
            <div class="permission-icon">🔔</div>
            <div class="permission-text">
              <p><strong>알림 접근 권한 필요</strong><br>
              음악 정보를 표시하려면 알림 리스너 권한이 필요합니다.</p>
              <button class="permission-btn" onclick="openNotificationSettings()">권한 설정하기</button>
            </div>
          </div>

        </div>
      </div><!-- /mediaPage -->

    </div><!-- /scroll-container -->
  </div><!-- /panel-right -->

</div><!-- /dashboard -->

<script>
/* ═══════════════════════════════════════════════════════════
   GALAXY STANDBY DASHBOARD — Main JavaScript
═══════════════════════════════════════════════════════════ */

// ─────────────────────────────────────────────────────────
//  1. 실시간 시계
// ─────────────────────────────────────────────────────────
const WEEKDAYS = ['일', '월', '화', '수', '목', '금', '토'];
const MONTHS_KO = ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];

function updateClock() {
  const now = new Date();
  let h = now.getHours();
  const m = now.getMinutes();
  const ampm = h >= 12 ? 'PM' : 'AM';
  h = h % 12 || 12;

  document.getElementById('clockTime').textContent =
    String(h).padStart(2, '0') + ':' + String(m).padStart(2, '0');
  document.getElementById('clockAmpm').textContent = ampm;

  const dateStr =
    now.getFullYear() + '년 ' +
    MONTHS_KO[now.getMonth()] + ' ' +
    now.getDate() + '일 ' +
    WEEKDAYS[now.getDay()] + '요일';
  document.getElementById('clockDate').textContent = dateStr;
}

updateClock();
setInterval(updateClock, 1000);

// ─────────────────────────────────────────────────────────
//  2. 날씨 (Open-Meteo 무료 API + Geolocation)
// ─────────────────────────────────────────────────────────
const WEATHER_ICONS = {
  0: ['☀️','맑음'], 1: ['🌤','대체로 맑음'], 2: ['⛅','부분적으로 흐림'],
  3: ['☁️','흐림'], 45: ['🌫','안개'], 48: ['🌫','결빙 안개'],
  51: ['🌦','이슬비'], 53: ['🌦','이슬비'], 55: ['🌧','이슬비'],
  61: ['🌧','비'], 63: ['🌧','비'], 65: ['🌧','폭우'],
  71: ['❄️','눈'], 73: ['❄️','눈'], 75: ['❄️','폭설'],
  80: ['🌦','소나기'], 81: ['🌧','소나기'], 82: ['⛈','강한 소나기'],
  95: ['⛈','뇌우'], 96: ['⛈','우박 동반 뇌우'], 99: ['⛈','뇌우']
};

function fetchWeather(lat, lon) {
  const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,apparent_temperature,relative_humidity_2m,wind_speed_10m,weather_code&timezone=auto&wind_speed_unit=ms`;

  fetch(url)
    .then(r => r.json())
    .then(data => {
      const c = data.current;
      const [icon, desc] = WEATHER_ICONS[c.weather_code] || ['🌡','알 수 없음'];

      document.getElementById('weatherLoading').classList.add('hidden');
      document.getElementById('weatherContent').classList.remove('hidden');
      document.getElementById('weatherTempVal').textContent = Math.round(c.temperature_2m);
      document.getElementById('weatherDesc').textContent = desc;
      document.getElementById('weatherIcon').textContent = icon;
      document.getElementById('weatherFeels').textContent = Math.round(c.apparent_temperature) + '°';
      document.getElementById('weatherHumidity').textContent = Math.round(c.relative_humidity_2m) + '%';
      document.getElementById('weatherWind').textContent = Math.round(c.wind_speed_10m) + 'm/s';
    })
    .catch(() => {
      document.getElementById('weatherLoading').innerHTML = '⚠️ 날씨 오류';
    });
}

if (navigator.geolocation) {
  navigator.geolocation.getCurrentPosition(
    pos => fetchWeather(pos.coords.latitude, pos.coords.longitude),
    ()  => fetchWeather(37.5665, 126.9780) // 기본: 서울
  );
} else {
  fetchWeather(37.5665, 126.9780);
}

// 날씨 30분마다 갱신
setInterval(() => {
  if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(
      pos => fetchWeather(pos.coords.latitude, pos.coords.longitude),
      ()  => fetchWeather(37.5665, 126.9780)
    );
  }
}, 30 * 60 * 1000);

// ─────────────────────────────────────────────────────────
//  3. 미니 달력 (캘린더 렌더링)
// ─────────────────────────────────────────────────────────
let calendarYear  = new Date().getFullYear();
let calendarMonth = new Date().getMonth(); // 0-indexed
let eventDays     = new Set(); // 일정 있는 날짜들 (이번 달)
let allEvents     = [];

function renderCalendar(year, month) {
  document.getElementById('calMonth').textContent = `${year}년 ${MONTHS_KO[month]}`;
  const grid = document.getElementById('calGrid');
  grid.innerHTML = '';

  // 요일 헤더
  ['일','월','화','수','목','금','토'].forEach(d => {
    const cell = document.createElement('div');
    cell.className = 'cal-day-name';
    cell.textContent = d;
    grid.appendChild(cell);
  });

  const today = new Date();
  const firstDay = new Date(year, month, 1).getDay(); // 0=일
  const lastDate = new Date(year, month + 1, 0).getDate();

  // 앞 빈칸
  for (let i = 0; i < firstDay; i++) {
    const cell = document.createElement('div');
    cell.className = 'cal-cell other-month';
    const prevLastDate = new Date(year, month, 0).getDate();
    cell.textContent = prevLastDate - firstDay + i + 1;
    grid.appendChild(cell);
  }

  // 날짜
  for (let d = 1; d <= lastDate; d++) {
    const cell = document.createElement('div');
    cell.className = 'cal-cell';

    const isToday = (d === today.getDate() && month === today.getMonth() && year === today.getFullYear());
    if (isToday) cell.classList.add('today');

    // 일정 도트
    const dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    if (eventDays.has(dateStr)) cell.classList.add('has-event');

    cell.textContent = d;
    grid.appendChild(cell);
  }

  // 뒤 빈칸
  const totalCells = firstDay + lastDate;
  const remaining = (7 - (totalCells % 7)) % 7;
  for (let i = 1; i <= remaining; i++) {
    const cell = document.createElement('div');
    cell.className = 'cal-cell other-month';
    cell.textContent = i;
    grid.appendChild(cell);
  }
}

function navigateMonth(dir) {
  calendarMonth += dir;
  if (calendarMonth < 0)  { calendarMonth = 11; calendarYear--; }
  if (calendarMonth > 11) { calendarMonth = 0;  calendarYear++; }
  renderCalendar(calendarYear, calendarMonth);
  renderEventList();
}

renderCalendar(calendarYear, calendarMonth);

// ─────────────────────────────────────────────────────────
//  4. 일정 리스트 렌더링
// ─────────────────────────────────────────────────────────
function renderEventList() {
  const today = new Date();
  const todayStr = formatDate(today);
  const curMonthStr = `${calendarYear}-${String(calendarMonth+1).padStart(2,'0')}`;

  const filtered = allEvents.filter(e => e.date && e.date.startsWith(curMonthStr));
  filtered.sort((a, b) => a.date.localeCompare(b.date));

  const list = document.getElementById('eventList');

  if (filtered.length === 0) {
    list.innerHTML = `
      <div class="no-events">
        <div class="no-events-icon">📭</div>
        <div class="no-events-text">이번 달 등록된 일정이 없습니다</div>
      </div>`;
    return;
  }

  list.innerHTML = '';
  const COLORS = ['#0A84FF','#30D158','#FF375F','#FF9F0A','#BF5AF2','#64D2FF'];

  filtered.forEach((ev, idx) => {
    const isToday = ev.date === todayStr;
    const item = document.createElement('div');
    item.className = 'event-item' + (isToday ? ' today-event' : '');
    item.style.animationDelay = (idx * 0.05) + 's';

    const color = COLORS[idx % COLORS.length];
    const dateParts = ev.date ? ev.date.split('-') : ['--','--','--'];
    const dateLabel = dateParts[1] + '/' + dateParts[2];

    item.innerHTML = `
      <div class="event-color-bar" style="background:${color}"></div>
      <div class="event-content">
        <div class="event-title">${escapeHtml(ev.title)}</div>
        <div class="event-time">${ev.allDay ? '종일' : (ev.startTime || '') + (ev.endTime ? ' ~ ' + ev.endTime : '')}</div>
      </div>
      <div class="event-date-badge">${isToday ? '오늘' : dateLabel}</div>`;

    list.appendChild(item);
  });
}

function formatDate(d) {
  return d.getFullYear() + '-' +
    String(d.getMonth()+1).padStart(2,'0') + '-' +
    String(d.getDate()).padStart(2,'0');
}

function escapeHtml(s) {
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}

// ─────────────────────────────────────────────────────────
//  5. Android → Web 콜백 함수 (JavascriptInterface 연동)
// ─────────────────────────────────────────────────────────

/**
 * 캘린더 데이터 수신 (Java → JavaScript)
 * @param {string} jsonStr - JSON 배열 문자열
 */
function receiveCalendarData(jsonStr) {
  try {
    const events = JSON.parse(jsonStr);
    allEvents = events;

    // 일정 날짜 Set 구축 (달력 도트용)
    eventDays = new Set(events.map(e => e.date).filter(Boolean));

    renderCalendar(calendarYear, calendarMonth);
    renderEventList();
  } catch (e) {
    console.error('캘린더 JSON 파싱 오류:', e);
  }
}

/**
 * 미디어 정보 수신 (Java → JavaScript)
 * @param {string} jsonStr - {title, artist, isPlaying} JSON 문자열
 */
function receiveMediaData(jsonStr) {
  try {
    const media = JSON.parse(jsonStr);
    updateMediaUI(media.title, media.artist, media.isPlaying);
  } catch (e) {
    console.error('미디어 JSON 파싱 오류:', e);
  }
}

function updateMediaUI(title, artist, isPlaying) {
  const titleEl  = document.getElementById('mediaTitle');
  const artistEl = document.getElementById('mediaArtist');
  const statusEl = document.getElementById('mediaStatus');
  const statusTxtEl = document.getElementById('mediaStatusText');
  const dotEl    = document.getElementById('liveDot');
  const albumEl  = document.getElementById('albumArt');
  const fillEl   = document.getElementById('progressFill');
  const visBars  = document.querySelectorAll('.vis-bar');
  const permCard = document.getElementById('permissionCard');

  const hasTrack = title && title !== '재생 중인 곡 없음';

  titleEl.textContent  = title  || '재생 중인 곡 없음';
  artistEl.textContent = artist || (hasTrack ? '' : '음악을 재생해보세요');

  // 제목이 길면 마퀴 애니메이션
  titleEl.classList.toggle('scrolling', hasTrack && title.length > 18);

  if (isPlaying && hasTrack) {
    statusEl.classList.remove('paused');
    statusTxtEl.textContent = 'Now Playing';
    dotEl.classList.remove('paused');
    albumEl.classList.add('playing');
    fillEl.classList.add('animating');
    visBars.forEach(b => b.classList.add('active'));
    permCard.classList.add('hidden');
  } else {
    statusEl.classList.add('paused');
    statusTxtEl.textContent = isPlaying ? '잠시 정지' : '대기 중';
    dotEl.classList.add('paused');
    albumEl.classList.remove('playing');
    fillEl.classList.remove('animating');
    visBars.forEach(b => b.classList.remove('active'));
    if (!hasTrack) permCard.classList.remove('hidden');
    else permCard.classList.add('hidden');
  }
}

// ─────────────────────────────────────────────────────────
//  6. 알림 설정 열기 (Android Bridge 호출)
// ─────────────────────────────────────────────────────────
function openNotificationSettings() {
  if (window.AndroidBridge && typeof window.AndroidBridge.openNotificationSettings === 'function') {
    window.AndroidBridge.openNotificationSettings();
  }
}

// ─────────────────────────────────────────────────────────
//  7. 스크롤 인디케이터 업데이트
// ─────────────────────────────────────────────────────────
const scrollContainer = document.getElementById('scrollContainer');
const scrollDots = document.querySelectorAll('.scroll-dot');

scrollContainer.addEventListener('scroll', () => {
  const scrollY = scrollContainer.scrollTop;
  const pageH   = scrollContainer.clientHeight;
  const pageIdx = Math.round(scrollY / pageH);

  scrollDots.forEach((dot, i) => {
    dot.classList.toggle('active', i === pageIdx);
  });
}, { passive: true });

// ─────────────────────────────────────────────────────────
//  8. Android Bridge 초기 데이터 폴링 (연결 전 대비)
// ─────────────────────────────────────────────────────────
function tryFetchFromAndroid() {
  if (window.AndroidBridge) {
    try {
      const calJson = window.AndroidBridge.getCalendarEvents();
      if (calJson) receiveCalendarData(calJson);
    } catch(e) {}

    try {
      const mediaJson = window.AndroidBridge.getMediaInfo();
      if (mediaJson) receiveMediaData(mediaJson);
    } catch(e) {}
  }
}

// 페이지 로드 직후 + 5초 후 한 번 더 시도
setTimeout(tryFetchFromAndroid, 800);
setTimeout(tryFetchFromAndroid, 5000);

// ─────────────────────────────────────────────────────────
//  9. 브라우저 테스트용 더미 데이터 주입 (Android 없을 때)
// ─────────────────────────────────────────────────────────
setTimeout(() => {
  if (!window.AndroidBridge) {
    const today = new Date();
    const fmt = d => d.getFullYear() + '-' +
                     String(d.getMonth()+1).padStart(2,'0') + '-' +
                     String(d.getDate()).padStart(2,'0');

    const d1 = new Date(today); d1.setDate(today.getDate());
    const d2 = new Date(today); d2.setDate(today.getDate() + 2);
    const d3 = new Date(today); d3.setDate(today.getDate() + 5);
    const d4 = new Date(today); d4.setDate(today.getDate() + 9);
    const d5 = new Date(today); d5.setDate(today.getDate() + 14);

    const demoEvents = [
      { id:1, title:'팀 미팅',           date:fmt(d1), startTime:'10:00', endTime:'11:00', allDay:false },
      { id:2, title:'점심 약속',          date:fmt(d1), startTime:'12:30', endTime:'13:30', allDay:false },
      { id:3, title:'프로젝트 데드라인',  date:fmt(d2), startTime:'18:00', endTime:'',      allDay:false },
      { id:4, title:'독서 모임',          date:fmt(d3), startTime:'19:00', endTime:'21:00', allDay:false },
      { id:5, title:'생일 파티 🎂',       date:fmt(d4), startTime:'',      endTime:'',      allDay:true  },
      { id:6, title:'여행 출발 ✈️',       date:fmt(d5), startTime:'08:00', endTime:'',      allDay:false },
    ];

    receiveCalendarData(JSON.stringify(demoEvents));
    receiveMediaData(JSON.stringify({
      title: 'Blinding Lights',
      artist: 'The Weeknd',
      isPlaying: true
    }));

    // 날씨 더미 (인터넷 없을 때 대비)
    setTimeout(() => {
      if (document.getElementById('weatherContent').classList.contains('hidden')) {
        document.getElementById('weatherLoading').classList.add('hidden');
        document.getElementById('weatherContent').classList.remove('hidden');
        document.getElementById('weatherTempVal').textContent = '24';
        document.getElementById('weatherDesc').textContent = '대체로 맑음';
        document.getElementById('weatherIcon').textContent = '🌤';
        document.getElementById('weatherFeels').textContent = '26°';
        document.getElementById('weatherHumidity').textContent = '58%';
        document.getElementById('weatherWind').textContent = '3m/s';
      }
    }, 5000);
  }
}, 1500);

console.log('🚀 Galaxy StandBy Dashboard initialized');
</script>
</body>
